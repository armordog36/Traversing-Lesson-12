<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pansy Shop</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/script.js" defer></script>
</head>
<body>

<h1>Pansy Flower Shop 🌸</h1>

<div class="container">

    <!-- PRODUCTS -->
    <div class="products">

        <div class="item">
            <img src="images/pansy1.jpg" alt="Purple Pansy">
            <h3>Purple Pansy</h3>

            <span class="rating">
                <img src="images/staroff.gif">
                <img src="images/staroff.gif">
                <img src="images/staroff.gif">
                <img src="images/staroff.gif">
                <img src="images/staroff.gif">
            </span>

            <button class="add" id="p1" name="Purple Pansy">Add to Cart</button>
        </div>

        <div class="item">
            <img src="images/pansy2.jpg" alt="Yellow Pansy">
            <h3>Yellow Pansy</h3>

            <span class="rating">
                <img src="images/staroff.gif">
                <img src="images/staroff.gif">
                <img src="images/staroff.gif">
                <img src="images/staroff.gif">
                <img src="images/staroff.gif">
            </span>

            <button class="add" id="p2" name="Yellow Pansy">Add to Cart</button>
        </div>

        <div class="item">
            <img src="images/pansy3.jpg" alt="Blue Pansy">
            <h3>Blue Pansy</h3>

            <span class="rating">
                <img src="images/staroff.gif">
                <img src="images/staroff.gif">
                <img src="images/staroff.gif">
                <img src="images/staroff.gif">
                <img src="images/staroff.gif">
            </span>

            <button class="add" id="p3" name="Blue Pansy">Add to Cart</button>
        </div>

    </div>

    <!-- CART -->
    <div id="cart">
        <h2>Shopping Cart</h2>
        <ul>
            <li id="empty">Your cart is empty</li>
        </ul>
    </div>

</div>

</body>
</html>
